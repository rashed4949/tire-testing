---
- name: Rollback Tire Testing — Hybrid Pipeline
  hosts: hybrid-prod
  become: yes

  vars:
    ecr_registry: ""
    previous_tag: ""
    aws_region: "eu-central-1"
    db_url: ""
    db_user: "tire_user"
    db_password: ""

  tasks:

    - name: "Record rollback start time"
      set_fact:
        rollback_start: "{{ ansible_date_time.iso8601 }}"

    - name: "Authenticate Docker with ECR"
      shell: |
        aws ecr get-login-password --region {{ aws_region }} \
          | docker login --username AWS \
          --password-stdin {{ ecr_registry }}

    - name: "Pull previous version image"
      community.docker.docker_image:
        name: "{{ ecr_registry }}/tire-testing:{{ previous_tag }}"
        source: pull
        force_source: yes

    - name: "Stop current container"
      community.docker.docker_container:
        name: tire-testing
        state: absent
        force_kill: yes
      ignore_errors: yes

    - name: "Start previous version container"
      community.docker.docker_container:
        name: tire-testing
        image: "{{ ecr_registry }}/tire-testing:{{ previous_tag }}"
        state: started
        restart_policy: unless-stopped
        ports: ["8080:8080", "8081:8081"]
        env:
          DB_URL:      "{{ db_url }}"
          DB_USER:     "{{ db_user }}"
          DB_PASSWORD: "{{ db_password }}"
          MANAGEMENT_SERVER_PORT:                    "8081"
          MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
          MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED:    "true"

    - name: "Wait for recovery"
      uri:
        url: "http://{{ inventory_hostname }}:8081/actuator/health"
        status_code: 200
      retries: 36
      delay: 5
      register: r
      until: r.status == 200

    - name: "Show recovery result"
      debug:
        msg: "✓ Rollback complete. Health: {{ r.json.status }}"
