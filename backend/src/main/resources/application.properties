spring.application.name=tire-testing

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/tire_testing_db
spring.datasource.username=tire_user
spring.datasource.password=Raiyanhasan4949
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=TireTestingSecretKey2024ForContinentalAGThesisProjectLongEnough!!
app.jwt.expiration-ms=86400000

# ── Actuator / Prometheus ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=tire-testing

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8082
server.error.whitelabel.enabled=false
