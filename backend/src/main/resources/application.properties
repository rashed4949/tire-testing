spring.application.name=tire-testing

#  Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tire_testing_db}
spring.datasource.username=${DB_USER:tire_user}
spring.datasource.password=${DB_PASSWORD:Raiyanhasan4949}
spring.datasource.driver-class-name=org.postgresql.Driver
